{% extends "base.html" %}

{% block title %}数据管理 - VulnKB{% endblock %}

{% block content %}
<div class="max-w-xl">
    <h1 class="text-xl font-bold text-gray-800 mb-6">数据管理</h1>

    <!-- 导出 -->
    <div class="bg-white rounded-xl shadow-sm p-6 mb-5">
        <h2 class="text-sm font-semibold text-gray-700 mb-2">一键导出</h2>
        <p class="text-xs text-gray-500 mb-4">将所有目录和攻击模式导出为 JSON 文件，可用于备份或迁移到其他实例。</p>
        <a href="/api/export"
           class="inline-block px-5 py-2 bg-indigo-600 hover:bg-indigo-500 text-white text-sm font-medium rounded-lg transition shadow-sm">
            下载导出文件
        </a>
    </div>

    <!-- 导入 -->
    <div class="bg-white rounded-xl shadow-sm p-6">
        <h2 class="text-sm font-semibold text-gray-700 mb-2">数据导入</h2>
        <p class="text-xs text-gray-500 mb-4">
            上传之前导出的 JSON 文件。同名目录将合并（追加条目），不同名目录将新建。
        </p>

        <div id="import-area">
            <label class="flex flex-col items-center justify-center w-full h-32 border-2 border-dashed border-gray-300
                          rounded-xl cursor-pointer hover:border-indigo-400 hover:bg-indigo-50 transition">
                <svg class="w-8 h-8 text-gray-400 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/>
                </svg>
                <span class="text-sm text-gray-500">点击选择 JSON 文件</span>
                <input type="file" id="import-file" accept=".json" class="hidden">
            </label>
        </div>

        <div id="import-status" class="hidden mt-4">
            <div id="import-loading" class="hidden text-sm text-gray-500">
                <svg class="animate-spin w-4 h-4 inline mr-1" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                正在导入...
            </div>
            <div id="import-success" class="hidden bg-green-50 border border-green-200 text-green-700 px-4 py-2.5 rounded-lg text-sm"></div>
            <div id="import-error" class="hidden bg-red-50 border border-red-200 text-red-700 px-4 py-2.5 rounded-lg text-sm"></div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
(function() {
    var fileInput = document.getElementById('import-file');
    var statusDiv = document.getElementById('import-status');
    var loadingDiv = document.getElementById('import-loading');
    var successDiv = document.getElementById('import-success');
    var errorDiv = document.getElementById('import-error');

    fileInput.addEventListener('change', function() {
        var file = this.files[0];
        if (!file) return;

        statusDiv.classList.remove('hidden');
        loadingDiv.classList.remove('hidden');
        successDiv.classList.add('hidden');
        errorDiv.classList.add('hidden');

        var formData = new FormData();
        formData.append('file', file);

        fetch('/api/import', { method: 'POST', body: formData })
            .then(function(r) { return r.json(); })
            .then(function(data) {
                loadingDiv.classList.add('hidden');
                if (data.success) {
                    successDiv.textContent = data.message;
                    successDiv.classList.remove('hidden');
                    setTimeout(function() { window.location.reload(); }, 1500);
                } else {
                    errorDiv.textContent = data.detail || '导入失败';
                    errorDiv.classList.remove('hidden');
                }
            })
            .catch(function(err) {
                loadingDiv.classList.add('hidden');
                errorDiv.textContent = '导入请求失败：' + err.message;
                errorDiv.classList.remove('hidden');
            });

        fileInput.value = '';
    });
})();
</script>
{% endblock %}
