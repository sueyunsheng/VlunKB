{% extends "base.html" %}

{% block title %}
    {% if category %}编辑目录 - {{ category.name }}{% else %}新建目录{% endif %} - VulnKB
{% endblock %}

{% block content %}
<div class="max-w-lg mx-auto">

    <div class="flex items-center justify-between mb-5">
        <h1 class="text-xl font-bold text-gray-800">
            {% if category %}编辑目录{% else %}新建目录{% endif %}
        </h1>
        <a href="{% if category %}/category/{{ category.id }}{% else %}/{% endif %}"
           class="text-sm text-gray-500 hover:text-indigo-600 transition">取消</a>
    </div>

    <form method="POST"
          action="{% if category %}/category/{{ category.id }}/edit{% else %}/category/new{% endif %}"
          class="bg-white rounded-xl shadow-sm p-6 space-y-5">

        <div>
            <label for="name" class="block text-sm font-medium text-gray-700 mb-1">目录名称</label>
            <input type="text" id="name" name="name" required
                   value="{{ category.name if category else '' }}"
                   placeholder="例如：反序列化、SQL注入、XSS"
                   class="w-full px-4 py-2 border border-gray-300 rounded-lg shadow-sm text-sm
                          focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
        </div>

        <div>
            <label for="description" class="block text-sm font-medium text-gray-700 mb-1">
                目录描述 <span class="text-gray-400 font-normal">（可选）</span>
            </label>
            <textarea id="description" name="description" rows="3"
                      placeholder="简要描述该目录的用途..."
                      class="w-full px-4 py-2 border border-gray-300 rounded-lg shadow-sm text-sm
                             focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500
                             resize-y">{{ category.description if category else '' }}</textarea>
        </div>

        <div class="flex justify-end">
            <button type="submit"
                    class="px-6 py-2.5 bg-indigo-600 hover:bg-indigo-500 text-white text-sm font-medium
                           rounded-lg transition shadow-sm">
                {% if category %}保存修改{% else %}创建目录{% endif %}
            </button>
        </div>
    </form>

    {% if category %}
    <div class="mt-6 bg-white rounded-xl shadow-sm p-6">
        <h3 class="text-sm font-semibold text-red-600 mb-2">危险操作</h3>
        <p class="text-xs text-gray-500 mb-3">删除目录将同时删除该目录下的所有攻击模式条目，此操作不可撤销。</p>
        <form method="POST" action="/category/{{ category.id }}/delete"
              onsubmit="return confirm('确认删除目录「{{ category.name }}」及其下所有条目？此操作不可撤销！')">
            <button type="submit"
                    class="px-4 py-2 bg-red-600 hover:bg-red-500 text-white text-sm rounded-lg transition">
                删除此目录
            </button>
        </form>
    </div>
    {% endif %}
</div>
{% endblock %}
